query getTasksFromProjects($projectId: ID!){
    node(id: $projectId) {
        ... on ProjectV2 {
            title
            items(first: 20) {
                nodes {
                    id
                    fieldValues(first: 10) {
                        nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                                name
                                field {
                                    ... on ProjectV2SingleSelectField {
                                        name
                                    }
                                }
                            }
                        }
                    }
                    content {
                        ... on Issue {
                            id
                            number
                            title
                            state
                            body
                            repository {
                                name
                                owner {
                                    login
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}