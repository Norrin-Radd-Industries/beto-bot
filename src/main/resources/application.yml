spring:
  application:
    name: mcp-betobot
  threads:
    virtual:
      enabled: true
  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
    mcp:
      client:
        type: SYNC
        enabled: false
        streamable-http:
          connections:
            github:
              url: ${GITHUB_MCP_SERVER_ADDRESS}


logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG