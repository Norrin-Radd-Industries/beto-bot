server:
  port: 9812

spring:
  application:
    name: mcp-betobot
  threads:
    virtual:
      enabled: true

  ai:
    ollama:
      base-url: http://192.168.220.192:11434 #your local llm (ollama) address
      chat:
        num-ctx: 16384
      embedding:
        options:
          model: embeddinggemma
          keep-alive: 5m
    mcp:
      client:
        streamable-http:
          connections:
            github:
              url: ${GITHUB_MCP_SERVER_ADDRESS}

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        max-document-batch-size: 10000
        initialize-schema: true
        remove-existing-vector-store-table: true

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

github:
  clientId: ${GITHUB_CLIENT_ID}
  installationId: ${GITHUB_APP_INSTALL_ID}
  key: ${GITHUB_APP_KEY_PATH}
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET}

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.ai.mcp: TRACE
    io.modelcontextprotocol: TRACE